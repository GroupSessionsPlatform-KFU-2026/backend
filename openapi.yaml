openapi: 3.0.3
info:
  title: Group Sessions Platform API
  version: 1.1.0
  description: |
    Initial OpenAPI specification for the Group Sessions Platform MVP.
    This specification is based on the ER diagram and covers the main
    REST operations for authentication, projects, rooms, participants,
    chat, board, comments and pomodoro management.

servers:
  - url: http://localhost:8000
    description: Local development server

tags:
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User profile endpoints
  - name: projects
    description: Project management
  - name: tags
    description: Project tags
  - name: rooms
    description: Session rooms
  - name: participants
    description: Room participants
  - name: chat
    description: Room chat messages
  - name: board
    description: Collaborative board elements
  - name: board-comments
    description: Comments for board elements
  - name: pomodoro
    description: Pomodoro timer management

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                required: [ success ]
        '409':
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emailExists:
                  value:
                    error: EMAIL_ALREADY_EXISTS
                    message: User with this email already exists
                    details: null
                usernameExists:
                  value:
                    error: USERNAME_ALREADY_EXISTS
                    message: User with this username already exists
                    details: null
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Request validation failed
                details:
                  - field: email
                    message: field required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /auth/login:
    post:
      tags: [ auth ]
      summary: Login user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [ username, password ]
              properties:
                username:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        '200':
          description: Successful authentication
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly cookie with refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_CREDENTIALS
                message: Invalid email or password
                details: null
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Request validation failed
                details:
                  - field: password
                    message: field required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null
  /auth/refresh:
    post:
      tags: [ auth ]
      summary: Refresh JWT tokens
      operationId: refreshTokens
      parameters:
        - name: refresh_token
          in: cookie
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tokens refreshed successfully
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Updated HttpOnly cookie with refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [ auth ]
      summary: Logout user
      operationId: logoutUser
      parameters:
        - name: refresh_token
          in: cookie
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful logout
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Clears refresh token cookie
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
  /users/me:
    get:
      tags: [users]
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - OAuth2PasswordBearer:
            - users:read
      responses:
        '200':
          description: Current authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /users/{user_id}:
    get:
      tags: [users]
      summary: Get user by id
      operationId: getUserById
      security:
        - OAuth2PasswordBearer:
            - users:read
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: USER_NOT_FOUND
                message: User with this id does not exist
                details: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /projects:
    get:
      tags: [projects]
      summary: Get project list
      operationId: getProjects
      security:
        - OAuth2PasswordBearer:
            - projects:read
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          description: Search by project title
          schema:
            type: string
        - name: owner_id
          in: query
          description: Filter by project owner
          schema:
            type: string
            format: uuid
        - name: is_archived
          in: query
          description: Filter by archive status
          schema:
            type: boolean
        - name: tag_id
          in: query
          description: Filter by assigned tag
          schema:
            type: string
            format: uuid
        - name: ordering
          in: query
          description: Sort field
          schema:
            type: string
            enum: [created_at, -created_at, title, -title]
      responses:
        '200':
          description: Paginated list of projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

    post:
      tags: [projects]
      summary: Create a new project
      operationId: createProject
      security:
        - OAuth2PasswordBearer:
            - projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Request validation failed
                details:
                  - field: title
                    message: field required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /projects/{project_id}:
    get:
      tags: [projects]
      summary: Get project by id
      operationId: getProjectById
      security:
        - OAuth2PasswordBearer:
            - projects:read
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: PROJECT_NOT_FOUND
                message: Project with this id does not exist
                details: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

    put:
      tags: [projects]
      summary: Update project
      operationId: updateProject
      security:
        - OAuth2PasswordBearer:
            - projects:write
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '403':
          description: Only project owner can update project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: NOT_PROJECT_OWNER
                message: You do not have permission to update this project
                details: null
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Request validation failed
                details:
                  - field: title
                    message: must be a string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

    delete:
      tags: [projects]
      summary: Archive project
      operationId: archiveProject
      security:
        - OAuth2PasswordBearer:
            - projects:write
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '204':
          description: Project archived successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '403':
          description: Only project owner can archive project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /projects/{project_id}/tags:
    get:
      tags: [projects]
      summary: Get tags assigned to a project
      operationId: getProjectTags
      security:
        - OAuth2PasswordBearer:
            - projects:read
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Tags assigned to project
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

    post:
      tags: [projects]
      summary: Assign tag to project
      operationId: assignTagToProject
      security:
        - OAuth2PasswordBearer:
            - projects:write
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTagRequest'
      responses:
        '201':
          description: Tag assigned to project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTagResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '404':
          description: Project or tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Tag already assigned to project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: PROJECT_TAG_ALREADY_EXISTS
                message: This tag is already assigned to the project
                details: null
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Request validation failed
                details:
                  - field: tag_id
                    message: field required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /projects/{project_id}/tags/{tag_id}:
    delete:
      tags: [projects]
      summary: Remove tag from project
      operationId: removeTagFromProject
      security:
        - OAuth2PasswordBearer:
            - projects:write
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/TagIdParam'
      responses:
        '204':
          description: Tag removed from project
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '404':
          description: Project, tag or relation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /tags:
    get:
      tags: [tags]
      summary: Get tag list
      operationId: getTags
      security:
        - OAuth2PasswordBearer:
            - tags:read
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          description: Search by tag name
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

    post:
      tags: [tags]
      summary: Create a new tag
      operationId: createTag
      security:
        - OAuth2PasswordBearer:
            - tags:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '201':
          description: Tag created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '409':
          description: Tag name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: TAG_ALREADY_EXISTS
                message: Tag with this name already exists
                details: null
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Request validation failed
                details:
                  - field: name
                    message: field required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /tags/{tag_id}:
    get:
      tags: [tags]
      summary: Get tag by id
      operationId: getTagById
      security:
        - OAuth2PasswordBearer:
            - tags:read
      parameters:
        - $ref: '#/components/parameters/TagIdParam'
      responses:
        '200':
          description: Tag detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /rooms:
    get:
      tags: [rooms]
      summary: Get room list
      operationId: getRooms
      security:
        - OAuth2PasswordBearer:
            - rooms:read
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: project_id
          in: query
          description: Filter by project id
          schema:
            type: string
            format: uuid
        - name: creator_id
          in: query
          description: Filter by creator id
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by room status
          schema:
            type: string
            enum: [active, ended]
        - name: room_code
          in: query
          description: Search by room code
          schema:
            type: string
        - name: ordering
          in: query
          description: Sort field
          schema:
            type: string
            enum: [created_at, -created_at, title, -title]
      responses:
        '200':
          description: Paginated list of rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

    post:
      tags: [rooms]
      summary: Create room
      operationId: createRoom
      security:
        - OAuth2PasswordBearer:
            - rooms:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '404':
          description: Related project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Request validation failed
                details:
                  - field: max_participants
                    message: field required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred on the server
                details: null

  /rooms/join:
    post:
      tags: [rooms]
      summary: Join room by room code
      operationId: joinRoom
      security:
        - OAuth2PasswordBearer:
            - rooms:read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Successfully joined room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomParticipantResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication credentials were not provided or are invalid
                details: null
        '404':
          description: Room with this code not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_ROOM_CODE
